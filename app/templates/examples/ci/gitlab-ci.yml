# Example GitLab CI template
#
# Jinja2 variables:
#   - app_name:    Name of the service
#   - image_repo:  Container registry URL
#
# In a real setup, these jobs would typically use `include:` and `extends:`
# to inherit shared CI templates. Inline scripts here are placeholders.

stages:
  - build
  - test
  - deploy

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t {{ image_repo }}/{{ app_name }}:$CI_COMMIT_SHORT_SHA .
    - docker push {{ image_repo }}/{{ app_name }}:$CI_COMMIT_SHORT_SHA

test:
  stage: test
  script:
    - echo "Run your tests here"

deploy:
  stage: deploy
  script:
    - echo "Deploy {{ app_name }}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
