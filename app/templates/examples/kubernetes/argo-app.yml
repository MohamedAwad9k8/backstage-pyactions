# Example ArgoCD Application manifest template
#
# This is a standard ArgoCD Application CR. It tells ArgoCD to watch
# a Git repo and sync Helm values into a target namespace.
#
# Jinja2 variables:
#   - app_name:          Name of the application
#   - repo_url:          Git repository URL containing the Helm chart/values
#   - target_revision:   Branch or tag to track (e.g., main, v1.0.0)
#   - values_file:       Path to the Helm values file in the repo

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ app_name }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ repo_url }}
    targetRevision: {{ target_revision }}
    helm:
      valueFiles:
        - {{ values_file }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ app_name }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
