# Module Configuration
# Maps URL routes to module code.
#
# Each module needs:
#   - name:        Human-readable name (shown in API docs)
#   - path:        Python import path to the module folder
#   - route:       URL path that Backstage will call
#   - description: (optional) Shown in Swagger/OpenAPI docs
#
# Note: The pseudo-code examples (create_service_pseudo.py, update_config_pseudo.py)
# are NOT registered here — they are reference files showing real-world workflow patterns.

modules:

  # --- Basic testing modules ---
  - name: List Directory
    path: app.modules.examples.basic-testing.list_directory
    route: /list-directory
    description: List contents of a directory

  - name: Print Working Directory
    path: app.modules.examples.basic-testing.print_working_dir
    route: /pwd
    description: Check a directory path

  - name: Make Directory
    path: app.modules.examples.basic-testing.make_directory
    route: /mkdir
    description: Create a new directory

  # --- Git provider example modules ---
  - name: Test GitHub Provider
    path: app.modules.examples.providers.github
    route: /test-github-provider
    description: Scaffold a project using the built-in GitHub provider (create branch, commit files, open PR)

  - name: Test GitLab Provider
    path: app.modules.examples.providers.gitlab
    route: /test-gitlab-provider
    description: Scaffold a project using the built-in GitLab provider (create branch, commit files, open MR)
