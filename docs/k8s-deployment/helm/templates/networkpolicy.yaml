{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-backstage-only
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.backstageLabels | nindent 14 }}
      ports:
        - port: {{ .Values.service.port }}
{{- end }}
